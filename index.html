<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusStudio Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --bg-0:#0a0a0a;--bg-1:#141414;--bg-2:#1e1e1e;--bg-3:#282828;--bg-4:#333;
    --border:#2a2a2a;--border-h:#444;
    --t0:#f5f5f5;--t1:#ccc;--t2:#888;--t3:#555;
    --accent:#00d4aa;--accent-dim:rgba(0,212,170,.15);--accent-h:#00f0c0;
    --warn:#ff8c42;--err:#ff4757;--ok:#2ed573;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg-0);color:var(--t0);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg-1);}
::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--t3);}

#topbar{height:44px;background:var(--bg-1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;z-index:50;}
.logo{font-weight:700;font-size:15px;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),#00f0c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:8px;}
.menu-item{padding:4px 10px;border-radius:4px;color:var(--t2);cursor:pointer;font-size:12px;transition:.15s;}
.menu-item:hover{background:var(--bg-3);color:var(--t0);}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
.device-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid transparent;color:var(--t2);cursor:pointer;transition:.15s;font-size:14px;}
.device-btn:hover{background:var(--bg-3);color:var(--t1);}
.device-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.zoom-ctrl{display:flex;align-items:center;gap:4px;background:var(--bg-2);border-radius:6px;padding:2px 4px;}
.zoom-ctrl button{width:24px;height:24px;border:none;background:transparent;color:var(--t2);cursor:pointer;border-radius:4px;font-size:11px;display:flex;align-items:center;justify-content:center;}
.zoom-ctrl button:hover{background:var(--bg-3);color:var(--t0);}
.zoom-ctrl span{color:var(--t1);font-size:11px;min-width:36px;text-align:center;font-family:'JetBrains Mono',monospace;}
.action-btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg-2);color:var(--t1);cursor:pointer;font-size:12px;font-family:inherit;display:flex;align-items:center;gap:6px;transition:.15s;}
.action-btn:hover{border-color:var(--border-h);color:var(--t0);}
.action-btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.action-btn.primary:hover{background:var(--accent-h);}

#workspace{flex:1;display:flex;overflow:hidden;}

#leftPanel{width:240px;background:var(--bg-1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.panel-section{border-bottom:1px solid var(--border);}
.panel-header{padding:8px 12px;display:flex;align-items:center;justify-content:between;font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none;}
.panel-header:hover{color:var(--t1);}
.panel-content{padding:6px 8px;}
.tools-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.tool-btn{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;border:none;background:transparent;color:var(--t2);cursor:pointer;transition:.15s;font-size:15px;gap:2px;position:relative;}
.tool-btn span{font-size:8px;letter-spacing:.3px;}
.tool-btn:hover{background:var(--bg-3);color:var(--t1);}
.tool-btn.active{background:var(--accent-dim);color:var(--accent);}
.comp-category{margin-bottom:2px;}
.comp-cat-header{padding:6px 8px;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;}
.comp-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;cursor:pointer;transition:.12s;color:var(--t1);font-size:12px;}
.comp-item:hover{background:var(--bg-3);color:var(--t0);}
.comp-item i{width:20px;text-align:center;color:var(--t2);font-size:13px;}
.comp-item:hover i{color:var(--accent);}

.layer-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:4px;cursor:pointer;transition:.1s;font-size:11px;color:var(--t1);}
.layer-item:hover{background:var(--bg-3);}
.layer-item.selected{background:var(--accent-dim);color:var(--accent);}
.layer-item i{font-size:10px;color:var(--t3);width:14px;text-align:center;}
.layer-item .layer-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

#canvasContainer{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;background:var(--bg-0);position:relative;background-image:radial-gradient(circle at 1px 1px,var(--bg-2) 1px,transparent 0);background-size:24px 24px;}
.artboard-wrapper{transition:transform .3s ease;position:relative;}
.device-frame{background:#000;border-radius:36px;padding:10px;box-shadow:0 0 0 1px var(--bg-4),0 20px 80px rgba(0,0,0,.6);position:relative;transition:all .3s ease;}
.device-frame.tablet-frame{border-radius:20px;padding:12px;}
.device-frame.desktop-frame{border-radius:8px;padding:4px;}
.device-notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:28px;background:#000;border-radius:0 0 16px 16px;z-index:10;}
#artboard{position:relative;overflow:hidden;background:#fff;border-radius:26px;transition:all .3s ease;cursor:default;}
.device-frame.tablet-frame #artboard{border-radius:10px;}
.device-frame.desktop-frame #artboard{border-radius:4px;}
#artboard.draw-mode{cursor:crosshair;}
#drawCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;}
#artboard .studio-el{position:absolute;cursor:move;user-select:none;transition:box-shadow .1s;}
#artboard .studio-el:hover{box-shadow:0 0 0 1px rgba(0,212,170,.4);}
#artboard .studio-el.selected{box-shadow:0 0 0 2px var(--accent);z-index:100;}
.resize-handle{position:absolute;width:8px;height:8px;background:var(--accent);border:1px solid #000;border-radius:2px;z-index:101;display:none;}
.studio-el.selected .resize-handle{display:block;}
.resize-handle.se{bottom:-4px;right:-4px;cursor:se-resize;}
.resize-handle.sw{bottom:-4px;left:-4px;cursor:sw-resize;}
.resize-handle.ne{top:-4px;right:-4px;cursor:ne-resize;}
.resize-handle.nw{top:-4px;left:-4px;cursor:nw-resize;}

#rightPanel{width:300px;background:var(--bg-1);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.tab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab-btn{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border:none;background:transparent;transition:.15s;position:relative;}
.tab-btn:hover{color:var(--t1);}
.tab-btn.active{color:var(--accent);}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:1px;}
.tab-panel{flex:1;overflow-y:auto;display:none;}
.tab-panel.active{display:block;}
.prop-group{padding:10px 12px;border-bottom:1px solid var(--border);}
.prop-group-title{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.prop-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.prop-label{font-size:11px;color:var(--t2);min-width:60px;}
.prop-input{flex:1;height:28px;background:var(--bg-2);border:1px solid var(--border);border-radius:5px;padding:0 8px;color:var(--t0);font-size:11px;font-family:'JetBrains Mono',monospace;outline:none;transition:.15s;}
.prop-input:focus{border-color:var(--accent);}
.prop-input[type="color"]{padding:2px;cursor:pointer;width:36px;min-width:36px;flex:none;}
.prop-select{flex:1;height:28px;background:var(--bg-2);border:1px solid var(--border);border-radius:5px;padding:0 6px;color:var(--t0);font-size:11px;font-family:inherit;outline:none;cursor:pointer;}
.prop-select:focus{border-color:var(--accent);}

#codePanel{padding:0;}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg-2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;}
.code-header span{font-size:11px;color:var(--t2);font-family:'JetBrains Mono',monospace;}
#codeOutput{padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;color:var(--t1);white-space:pre-wrap;word-break:break-all;tab-size:2;}
#codeOutput .tag{color:#ff8c42;}
#codeOutput .attr{color:#00d4aa;}
#codeOutput .val{color:#ffd166;}
#codeOutput .css-prop{color:#ff6b9d;}
#codeOutput .css-val{color:#a8dadc;}
#codeOutput .comment{color:var(--t3);}

#bottomPanel{height:180px;background:var(--bg-1);border-top:1px solid var(--border);display:flex;flex-shrink:0;}
#chatPanel{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);}
#chatMessages{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:6px;}
.chat-msg{max-width:85%;padding:6px 10px;border-radius:8px;font-size:12px;line-height:1.4;animation:chatIn .25s ease;}
.chat-msg.user{align-self:flex-end;background:var(--accent-dim);color:var(--accent);border-bottom-right-radius:2px;}
.chat-msg.bot{align-self:flex-start;background:var(--bg-3);color:var(--t1);border-bottom-left-radius:2px;}
.chat-msg.bot strong{color:var(--accent);}
@keyframes chatIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
#chatInputBar{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--border);}
#chatInput{flex:1;height:32px;background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:0 10px;color:var(--t0);font-size:12px;font-family:inherit;outline:none;}
#chatInput:focus{border-color:var(--accent);}
#chatSend{width:32px;height:32px;border-radius:6px;border:none;background:var(--accent);color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
#chatSend:hover{background:var(--accent-h);}

#timelinePanel{width:320px;display:flex;flex-direction:column;flex-shrink:0;}
.timeline-controls{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);}
.timeline-controls button{width:28px;height:28px;border-radius:5px;border:1px solid var(--border);background:var(--bg-2);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:.15s;}
.timeline-controls button:hover{background:var(--bg-3);color:var(--t0);}
.timeline-controls button.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.timeline-controls span{font-size:11px;color:var(--t2);margin-left:auto;}
#timelineList{flex:1;overflow-y:auto;padding:6px;}
.timeline-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;font-size:11px;color:var(--t1);transition:.1s;}
.timeline-item:hover{background:var(--bg-3);}
.timeline-item .tl-icon{width:24px;height:24px;border-radius:4px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:10px;}
.timeline-item .tl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.timeline-item .tl-anim{font-size:10px;color:var(--accent);background:var(--accent-dim);padding:2px 6px;border-radius:3px;}
.timeline-item .tl-bar{flex:1;height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden;max-width:80px;}
.timeline-item .tl-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3);font-size:12px;gap:6px;}
.empty-state i{font-size:24px;opacity:.5;}

.toast{position:fixed;bottom:200px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-3);color:var(--t0);padding:8px 18px;border-radius:8px;font-size:12px;border:1px solid var(--border);box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;transition:.3s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--ok);color:var(--ok);}
.toast.error{border-color:var(--err);color:var(--err);}

.playing #artboard .studio-el[data-anim]{animation-fill-mode:both;}
@keyframes nx-fadeIn{from{opacity:0}to{opacity:1}}
@keyframes nx-slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes nx-slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
@keyframes nx-slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes nx-slideRight{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes nx-scaleUp{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes nx-bounce{0%{transform:scale(0)}50%{transform:scale(1.12)}70%{transform:scale(.95)}100%{transform:scale(1)}}
@keyframes nx-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes nx-rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes nx-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes nx-drawStroke{from{stroke-dashoffset:var(--dash-len)}to{stroke-dashoffset:0}}

.examples-dropdown{position:absolute;top:36px;left:0;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:4px;min-width:180px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:100;display:none;}
.examples-dropdown.show{display:block;}
.examples-dropdown button{width:100%;text-align:left;padding:7px 12px;border:none;background:transparent;color:var(--t1);cursor:pointer;border-radius:5px;font-size:12px;font-family:inherit;transition:.1s;}
.examples-dropdown button:hover{background:var(--bg-3);color:var(--accent);}
</style>
</head>
<body>

<!-- BARRA SUPERIOR -->
<div id="topbar">
    <div class="logo">NexusStudio</div>
    <div class="menu-item">Archivo</div>
    <div class="menu-item">Editar</div>
    <div class="menu-item">Vista</div>
    <div class="sep"></div>

    <div class="device-btn active" data-device="phone" title="Telefono"><i class="fa-solid fa-mobile-screen"></i></div>
    <div class="device-btn" data-device="tablet" title="Tablet"><i class="fa-solid fa-tablet-screen-button"></i></div>
    <div class="device-btn" data-device="desktop" title="Escritorio"><i class="fa-solid fa-display"></i></div>
    <div class="sep"></div>

    <div class="zoom-ctrl">
        <button onclick="changeZoom(-0.1)"><i class="fa-solid fa-minus"></i></button>
        <span id="zoomVal">85%</span>
        <button onclick="changeZoom(0.1)"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div class="sep"></div>

    <div style="position:relative">
        <button class="action-btn" onclick="toggleExamples()" id="examplesBtn"><i class="fa-solid fa-layer-group"></i> Ejemplos</button>
        <div class="examples-dropdown" id="examplesDropdown">
            <button onclick="loadExample('landing')"><i class="fa-solid fa-rocket" style="margin-right:6px;color:var(--accent)"></i>Landing Page</button>
            <button onclick="loadExample('login')"><i class="fa-solid fa-right-to-bracket" style="margin-right:6px;color:var(--warn)"></i>Login App</button>
            <button onclick="loadExample('dashboard')"><i class="fa-solid fa-chart-pie" style="margin-right:6px;color:var(--ok)"></i>Dashboard</button>
            <button onclick="loadExample('ecommerce')"><i class="fa-solid fa-bag-shopping" style="margin-right:6px;color:#ff6b9d"></i>E-Commerce</button>
            <button onclick="loadExample('social')"><i class="fa-solid fa-comments" style="margin-right:6px;color:#a78bfa"></i>Social Feed</button>
        </div>
    </div>

    <div style="flex:1"></div>
    <button class="action-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i> Previsualizar</button>
    <button class="action-btn primary" onclick="exportHTML()"><i class="fa-solid fa-download"></i> Exportar</button>
</div>

<!-- ESPACIO DE TRABAJO -->
<div id="workspace">
    <!-- PANEL IZQUIERDO -->
    <div id="leftPanel">
        <div class="panel-section">
            <div class="panel-header"><i class="fa-solid fa-pen-ruler" style="margin-right:6px"></i> Herramientas</div>
            <div class="panel-content">
                <div class="tools-grid">
                    <button class="tool-btn active" data-tool="select" title="Seleccionar"><i class="fa-solid fa-arrow-pointer"></i><span>Select</span></button>
                    <button class="tool-btn" data-tool="rectangle" title="Rectangulo"><i class="fa-regular fa-square"></i><span>Rect</span></button>
                    <button class="tool-btn" data-tool="circle" title="Circulo"><i class="fa-regular fa-circle"></i><span>Circle</span></button>
                    <button class="tool-btn" data-tool="text" title="Texto"><i class="fa-solid fa-font"></i><span>Text</span></button>
                    <button class="tool-btn" data-tool="draw" title="Dibujar"><i class="fa-solid fa-paintbrush"></i><span>Draw</span></button>
                    <button class="tool-btn" data-tool="eraser" title="Borrar dibujo"><i class="fa-solid fa-eraser"></i><span>Erase</span></button>
                    <button class="tool-btn" data-tool="image" title="Imagen"><i class="fa-regular fa-image"></i><span>Image</span></button>
                    <button class="tool-btn" data-tool="line" title="Linea"><i class="fa-solid fa-minus"></i><span>Line</span></button>
                </div>
            </div>
        </div>
        <div class="panel-section" style="flex:1;overflow-y:auto;">
            <div class="panel-header"><i class="fa-solid fa-shapes" style="margin-right:6px"></i> Componentes</div>
            <div class="panel-content" id="componentsList"></div>
        </div>
        <div class="panel-section" style="max-height:200px;overflow-y:auto;">
            <div class="panel-header"><i class="fa-solid fa-layer-group" style="margin-right:6px"></i> Capas <span id="layerCount" style="margin-left:auto;color:var(--t3)">0</span></div>
            <div id="layersList" style="padding:4px;"></div>
        </div>
    </div>

    <!-- CANVAS CENTRAL -->
    <div id="canvasContainer">
        <div class="artboard-wrapper" id="artboardWrapper">
            <div class="device-frame" id="deviceFrame">
                <div class="device-notch" id="deviceNotch"></div>
                <div id="artboard"></div>
            </div>
        </div>
    </div>

    <!-- PANEL DERECHO -->
    <div id="rightPanel">
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="props">Propiedades</button>
            <button class="tab-btn" data-tab="code">Codigo</button>
        </div>
        <div class="tab-panel active" id="propsPanel">
            <div class="empty-state" id="propsEmpty">
                <i class="fa-solid fa-arrow-pointer"></i>
                <span>Selecciona un elemento</span>
            </div>
            <div id="propsContent" style="display:none;"></div>
        </div>
        <div class="tab-panel" id="codePanel">
            <div class="code-header">
                <span>HTML + CSS</span>
                <button class="action-btn" onclick="copyCode()" style="padding:3px 10px;font-size:11px;"><i class="fa-regular fa-copy"></i> Copiar</button>
            </div>
            <div id="codeOutput"></div>
        </div>
    </div>
</div>

<!-- PANEL INFERIOR -->
<div id="bottomPanel">
    <div id="chatPanel">
        <div id="chatMessages"></div>
        <div id="chatInputBar">
            <input type="text" id="chatInput" placeholder="Escribe una instruccion... (ej: agregar boton azul)" autocomplete="off">
            <button id="chatSend" onclick="sendChat()"><i class="fa-solid fa-paper-plane" style="font-size:12px"></i></button>
        </div>
    </div>
    <div id="timelinePanel">
        <div class="timeline-controls">
            <button id="tlPlayBtn" onclick="togglePlay()" title="Reproducir"><i class="fa-solid fa-play"></i></button>
            <button onclick="stopPlay()" title="Detener"><i class="fa-solid fa-stop"></i></button>
            <button onclick="addAllAnimations()" title="Animar todo"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
            <span id="animCount">0 animaciones</span>
        </div>
        <div id="timelineList">
            <div class="empty-state" id="tlEmpty"><i class="fa-solid fa-film"></i><span>Sin animaciones</span></div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ============================================
   ESTADO GLOBAL
   ============================================ */
const S = {
    elements: [],
    selectedId: null,
    device: 'phone',
    zoom: 0.85,
    tool: 'select',
    isDrawing: false,
    currentPath: [],
    drawPaths: [],
    nextId: 1,
    isDragging: false,
    dragOffset: {x:0,y:0},
    isResizing: false,
    resizeHandle: '',
    resizeStart: {},
    isPlaying: false
};

/* ============================================
   DISPOSITIVOS
   ============================================ */

/* ============================================
   RENDERIZADO DE CONTENIDO DE ELEMENTOS
   ============================================ */
function renderElContent(el) {
    const p = el.props;
    const ff = "'Space Grotesk',sans-serif";
    switch(el.type) {
        case 'button':
            return `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:${p.bg};color:${p.color};border-radius:${p.borderRadius}px;font-size:${p.fontSize}px;font-weight:${p.fontWeight};font-family:${ff};${p.borderWidth?`border:${p.borderWidth}px solid ${p.borderColor};`:''}${p.shadow!=='none'?`box-shadow:${p.shadow};`:''}transition:transform .15s">${p.text}</div>`;
        case 'card':
            return `<div style="width:100%;height:100%;background:${p.bg};border-radius:${p.borderRadius}px;${p.borderColor?`border:1px solid ${p.borderColor};`:''}overflow:hidden;font-family:${ff};${p.shadow!=='none'?`box-shadow:${p.shadow};`:''}">
                ${p.showImage?`<div style="height:${p.imageHeight}px;background:${p.imageBg};"></div>`:''}
                <div style="padding:${p.padding}px;"><div style="font-size:${p.titleSize}px;font-weight:700;color:${p.titleColor};margin-bottom:6px;">${p.title}</div><div style="font-size:${p.descSize}px;color:${p.descColor};line-height:1.5;">${p.desc}</div></div></div>`;
        case 'navbar':
            const links = p.links.split(',').map(l=>`<span style="color:${p.color};opacity:.7;font-size:${p.fontSize}px;cursor:pointer">${l.trim()}</span>`).join('');
            return `<div style="width:100%;height:100%;background:${p.bg};display:flex;align-items:center;padding:0 20px;gap:20px;font-family:${ff};${p.shadow!=='none'?`box-shadow:${p.shadow};`:''}">
                <span style="font-weight:700;color:${p.color};font-size:16px;">${p.logo}</span><div style="flex:1"></div>${links}</div>`;
        case 'input':
            return `<div style="width:100%;height:100%;background:${p.bg};border:1px solid ${p.borderColor};border-radius:${p.borderRadius}px;display:flex;align-items:center;padding:0 14px;font-family:${ff};${p.shadow!=='none'?`box-shadow:${p.shadow};`:''}">

/* ============================================
   FUNCIONES PRINCIPALES
   ============================================ */
function addElement(type, x, y, overrides={}) {
    const def = DEFAULTS[type] || {w:120,h:80,bg:'#eee',borderRadius:4};
    const el = {
        id: S.nextId++,
        type,
        x: x || 20,
        y: y || 20,
        props: {...def, ...overrides},
        animation: null
    };
    // Ajustar ancho para navbar, hero, footer segun dispositivo
    if(['navbar','hero','footer'].includes(type) && !overrides.w) {
        el.props.w = DEVICES[S.device].w;
    }
    S.elements.push(el);
    selectElement(el.id);
    renderArtboard();
    updateCode();
    updateLayers();
    updateTimeline();
    return el;
}

function removeElement(id) {
    S.elements = S.elements.filter(e=>e.id!==id);
    if(S.selectedId===id) S.selectedId=null;
    renderArtboard();
    updateCode();
    updateLayers();
    updateTimeline();
    updateProps();
}

function selectElement(id) {
    S.selectedId = id;
    document.querySelectorAll('.studio-el').forEach(d=>{
        d.classList.toggle('selected', parseInt(d.dataset.id)===id);
    });
    updateProps();
    updateLayers();
}

function getSelected() {
    return S.elements.find(e=>e.id===S.selectedId);
}

/* ============================================
   RENDERIZAR ARTBOARD
   ============================================ */
function renderArtboard() {
    const ab = document.getElementById('artboard');
    const dev = DEVICES[S.device];
    ab.style.width = dev.w+'px';
    ab.style.height = dev.h+'px';

    // Mantener solo el canvas de dibujo si existe
    const drawCanvas = document.getElementById('drawCanvas');
    ab.innerHTML = '';

    S.elements.forEach(el => {
        const div = document.createElement('div');
        div.className = 'studio-el' + (el.id===S.selectedId?' selected':'');
        div.dataset.id = el.id;
        if(el.animation) div.dataset.anim = el.animation.kf;
        div.style.cssText = `left:${el.x}px;top:${el.y}px;width:${el.props.w}px;height:${el.props.h}px;`;
        if(S.isPlaying && el.animation) {
            div.style.animation = `${el.animation.kf} ${el.animation.dur} ${el.animation.delay} ${el.animation.iter||'forwards'} both`;
            div.style.animationDelay = el.animation.delay;
        }
        div.innerHTML = renderElContent(el) +
            `<div class="resize-handle se"></div><div class="resize-handle sw"></div><div class="resize-handle ne"></div><div class="resize-handle nw"></div>`;

        // Eventos del elemento
        div.addEventListener('mousedown', (e) => {
            if(S.tool==='select') {
                if(e.target.classList.contains('resize-handle')) {
                    startResize(e, el, e.target.classList.contains('se')?'se':e.target.classList.contains('sw')?'sw':e.target.classList.contains('ne')?'ne':'nw');
                } else {
                    e.stopPropagation();
                    selectElement(el.id);
                    startDrag(e, el);
                }
            }
        });
        ab.appendChild(div);
    });

    // Canvas de dibujo
    const canvas = document.createElement('canvas');
    canvas.id = 'drawCanvas';
    canvas.width = dev.w;
    canvas.height = dev.h;
    canvas.style.cssText = `position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:${S.tool==='draw'||S.tool==='eraser'?'auto':'none'};`;
    ab.appendChild(canvas);

    if(S.tool==='draw'||S.tool==='eraser') {
        setupDrawCanvas(canvas);
    }
    redrawPaths(canvas);
    ab.classList.toggle('draw-mode', S.tool==='draw'||S.tool==='eraser');
}

function updateDevice() {
    const dev = DEVICES[S.device];
    const frame = document.getElementById('deviceFrame');
    const notch = document.getElementById('deviceNotch');
    frame.className = 'device-frame ' + (dev.frameClass||'');
    notch.style.display = dev.notch?'block':'none';
    S.zoom = dev.zoom;
    document.getElementById('zoomVal').textContent = Math.round(S.zoom*100)+'%';
    document.getElementById('artboardWrapper').style.transform = `scale(${S.zoom})`;
    renderArtboard();
    updateCode();
}

function changeZoom(delta) {
    S.zoom = Math.max(0.2, Math.min(2, S.zoom + delta));
    document.getElementById('zoomVal').textContent = Math.round(S.zoom*100)+'%';
    document.getElementById('artboardWrapper').style.transform = `scale(${S.zoom})`;
}

/* ============================================
   DRAG & RESIZE
   ============================================ */
function startDrag(e, el) {
    S.isDragging = true;
    const ab = document.getElementById('artboard').getBoundingClientRect();
    S.dragOffset = {x: e.clientX/DEVICES[S.device].w*DEVICES[S.device].w - el.x, y: e.clientY/DEVICES[S.device].w*DEVICES[S.device].w - el.y};
    const rect = document.getElementById('artboard').getBoundingClientRect();
    const scale = rect.width / DEVICES[S.device].w;
    S.dragOffset = {x: (e.clientX - rect.left)/scale - el.x, y: (e.clientY - rect.top)/scale - el.y};
}

function startResize(e, el, handle) {
    S.isResizing = true;
    S.resizeHandle = handle;
    const rect = document.getElementById('artboard').getBoundingClientRect();
    const scale = rect.width / DEVICES[S.device].w;
    S.resizeStart = {mx: e.clientX, my: e.clientY, x: el.x, y: el.y, w: el.props.w, h: el.props.h, scale};
}

document.addEventListener('mousemove', (e) => {
    if(S.isDragging && S.selectedId) {
        const el = getSelected();
        if(!el) return;
        const rect = document.getElementById('artboard').getBoundingClientRect();
        const scale = rect.width / DEVICES[S.device].w;
        el.x = Math.round((e.clientX - rect.left)/scale - S.dragOffset.x);
        el.y = Math.round((e.clientY - rect.top)/scale - S.dragOffset.y);
        const dom = document.querySelector(`.studio-el[data-id="${el.id}"]`);
        if(dom) { dom.style.left=el.x+'px'; dom.style.top=el.y+'px'; }
    }
    if(S.isResizing && S.selectedId) {
        const el = getSelected();
        if(!el) return;
        const sc = S.resizeStart.scale;
        const dx = (e.clientX - S.resizeStart.mx)/sc;
        const dy = (e.clientY - S.resizeStart.my)/sc;
        const h = S.resizeHandle;
        if(h.includes('e')) el.props.w = Math.max(20, Math.round(S.resizeStart.w + dx));
        if(h.includes('s')) el.props.h = Math.max(20, Math.round(S.resizeStart.h + dy));
        if(h.includes('w')) { el.props.w = Math.max(20, Math.round(S.resizeStart.w - dx)); el.x = Math.round(S.resizeStart.x + dx); }
        if(h.includes('n')) { el.props.h = Math.max(20, Math.round(S.resizeStart.h - dy)); el.y = Math.round(S.resizeStart.y + dy); }
        const dom = document.querySelector(`.studio-el[data-id="${el.id}"]`);
        if(dom) { dom.style.width=el.props.w+'px'; dom.style.height=el.props.h+'px'; dom.style.left=el.x+'px'; dom.style.top=el.y+'px'; dom.innerHTML = renderElContent(el)+'<div class="resize-handle se"></div><div class="resize-handle sw"></div><div class="resize-handle ne"></div><div class="resize-handle nw"></div>'; }
        updateProps();
    }
});

document.addEventListener('mouseup', () => {
    if(S.isDragging || S.isResizing) {
        S.isDragging = false;
        S.isResizing = false;
        renderArtboard();
        updateCode();
    }
});

});

document.getElementById('artboard').addEventListener('click', (e) => {

});

/* ============================================
   DIBUJO LIBRE
   ============================================ */
function setupDrawCanvas(canvas) {
    let isDrawing = false;
    canvas.onmousedown = (e) => {
        isDrawing = true;
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        S.currentPath = [{x:(e.clientX-rect.left)*scale, y:(e.clientY-rect.top)*scale}];
    };
    canvas.onmousemove = (e) => {
        if(!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        const pt = {x:(e.clientX-rect.left)*scale, y:(e.clientY-rect.top)*scale};
        S.currentPath.push(pt);
        redrawPaths(canvas, true);
    };
    canvas.onmouseup = () => {
        if(isDrawing && S.currentPath.length > 2) {
            if(S.tool==='eraser') {
                // Borrar paths cercanos
                eraseNear(S.currentPath[0]);
            } else {
                S.drawPaths.push({
                    points: [...S.currentPath],
                    color: '#00d4aa',
                    width: 3,
                    animation: null
                });
                // Crear animacion SVG del dibujo
                createDrawAnimation(S.drawPaths.length - 1);
            }
            S.currentPath = [];
            redrawPaths(canvas);
            updateTimeline();
        }
        isDrawing = false;
    };
    canvas.onmouseleave = () => { isDrawing = false; S.currentPath = []; redrawPaths(canvas); };
}

function eraseNear(pt) {
    S.drawPaths = S.drawPaths.filter(path => {
        return !path.points.some(p => Math.hypot(p.x-pt.x, p.y-pt.y) < 20);
    });
    updateTimeline();
}

function redrawPaths(canvas, currentOnly=false) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if(!currentOnly) {
        S.drawPaths.forEach(path => {
            drawPath(ctx, path.points, path.color, path.width, path.animation && S.isPlaying);
        });
    }
    if(S.currentPath.length > 1) {
        drawPath(ctx, S.currentPath, S.tool==='eraser'?'#ff4757':'#00d4aa', S.tool==='eraser'?10:3, false);
    }
}

function drawPath(ctx, points, color, width, animated) {
    if(points.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for(let i=1; i<points.length; i++) {
        const prev = points[i-1];
        const curr = points[i];
        const mx = (prev.x+curr.x)/2;
        const my = (prev.y+curr.y)/2;
        ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if(animated) {
        ctx.setLineDash([ctx.measureText('').width || 1000]);
    }
    ctx.stroke();
    ctx.setLineDash([]);
}

function createDrawAnimation(index) {
    const path = S.drawPaths[index];
    if(!path) return;
    path.animation = {name: 'Trazo', kf: 'nx-drawStroke', dur: '1.5s', delay: '0s'};
    toast('Animacion de trazo creada', 'success');
}

/* ============================================
   PROPIEDADES
   ============================================ */
function updateProps() {
    const el = getSelected();
    const empty = document.getElementById('propsEmpty');
    const content = document.getElementById('propsContent');
    if(!el) {
        empty.style.display = 'flex';
        content.style.display = 'none';
        return;
    }
    empty.style.display = 'none';
    content.style.display = 'block';

    let html = `<div class="prop-group"><div class="prop-group-title">Elemento</div>
        <div class="prop-row"><span class="prop-label">Tipo</span><input class="prop-input" value="${el.type}" disabled></div>
        <div class="prop-row"><span class="prop-label">X</span><input class="prop-input" type="number" value="${el.x}" onchange="setProp(${el.id},'x',+this.value)"><span class="prop-label" style="min-width:20px">Y</span><input class="prop-input" type="number" value="${el.y}" onchange="setProp(${el.id},'y',+this.value)"></div>
        <div class="prop-row"><span class="prop-label">Ancho</span><input class="prop-input" type="number" value="${el.props.w}" onchange="setElProp(${el.id},'w',+this.value)"><span class="prop-label" style="min-width:20px">Alto</span><input class="prop-input" type="number" value="${el.props.h}" onchange="setElProp(${el.id},'h',+this.value)"></div>
    </div>`;

    // Propiedades dinamicas segun tipo
    const p = el.props;
    const propFields = getPropFields(el.type);
    if(propFields.length) {
        html += `<div class="prop-group"><div class="prop-group-title">Estilo</div>`;
        propFields.forEach(f => {
            html += renderPropField(el.id, f);
        });
        html += `</div>`;
    }

    // Animacion
    html += `<div class="prop-group"><div class="prop-group-title">Animacion</div>
        <div class="prop-row"><span class="prop-label">Tipo</span><select class="prop-select" onchange="setAnimation(${el.id},this.value)">
            <option value="">Sin animacion</option>
            ${Object.entries(ANIMS).map(([k,v])=>`<option value="${k}"${el.animation&&el.animation.kf===v.kf?' selected':''}>${v.name}</option>`).join('')}
        </select></div>`;
    if(el.animation) {
        html += `<div class="prop-row"><span class="prop-label">Duracion</span><input class="prop-input" value="${el.animation.dur}" onchange="setAnimProp(${el.id},'dur',this.value)">
            <span class="prop-label" style="min-width:30px">Delay</span><input class="prop-input" value="${el.animation.delay}" onchange="setAnimProp(${el.id},'delay',this.value)"></div>
            <div class="prop-row"><span class="prop-label">Repetir</span><select class="prop-select" onchange="setAnimProp(${el.id},'iter',this.value)">
            <option value="forwards"${el.animation.iter==='forwards'?' selected':''}>Una vez</option>
            <option value="infinite"${el.animation.iter==='infinite'?' selected':''}>Infinito</option>
            <option value="2"${el.animation.iter==='2'?' selected':''}>2 veces</option>
            <option value="3"${el.animation.iter==='3'?' selected':''}>3 veces</option>
        </select></div>`;
    }
    html += `</div>`;

    // Acciones
    html += `<div class="prop-group"><div class="prop-row" style="gap:6px">
        <button class="action-btn" style="flex:1;justify-content:center" onclick="duplicateElement(${el.id})"><i class="fa-regular fa-copy"></i> Duplicar</button>
        <button class="action-btn" style="flex:1;justify-content:center;color:var(--err);border-color:var(--err)" onclick="removeElement(${el.id})"><i class="fa-solid fa-trash"></i> Eliminar</button>
    </div></div>`;

    content.innerHTML = html;
}

function getPropFields(type) {
    const p = DEFAULTS[type] || {};
    const fields = [];
    if(p.bg !== undefined) fields.push({key:'bg',label:'Fondo',type:'color',textType:true});
    if(p.color !== undefined && !['toggle'].includes(type)) fields.push({key:'color',label:'Color Texto',type:'color',textType:true});
    if(p.borderRadius !== undefined) fields.push({key:'borderRadius',label:'Radio Borde',type:'number'});
    if(p.fontSize !== undefined) fields.push({key:'fontSize',label:'Fuente Px',type:'number'});
    if(p.fontWeight !== undefined) fields.push({key:'fontWeight',label:'Peso Fuente',type:'select',options:['300:Light','400:Regular','500:Medium','600:SemiBold','700:Bold','800:ExtraBold']});
    if(p.text !== undefined) fields.push({key:'text',label:'Texto',type:'text'});
    if(p.title !== undefined) fields.push({key:'title',label:'Titulo',type:'text'});
    if(p.desc !== undefined) fields.push({key:'desc',label:'Descripcion',type:'text'});
    if(p.subtitle !== undefined) fields.push({key:'subtitle',label:'Subtitulo',type:'text'});
    if(p.placeholder !== undefined) fields.push({key:'placeholder',label:'Placeholder',type:'text'});
    if(p.borderColor !== undefined && !['divider','line'].includes(type)) fields.push({key:'borderColor',label:'Borde Color',type:'color',textType:true});
    if(p.borderWidth !== undefined) fields.push({key:'borderWidth',label:'Borde Ancho',type:'number'});
    if(p.shadow !== undefined) fields.push({key:'shadow',label:'Sombra',type:'text'});
    if(p.textAlign !== undefined) fields.push({key:'textAlign',label:'Alinear',type:'select',options:['left:Izquierda','center:Centro','right:Derecha']});
    if(p.value !== undefined) fields.push({key:'value',label:'Valor',type:'text'});
    if(p.label !== undefined && ['statcard'].includes(type)) fields.push({key:'label',label:'Etiqueta',type:'text'});
    if(p.barColor !== undefined) fields.push({key:'barColor',label:'Color Barra',type:'color',textType:true});
    if(p.bars !== undefined) fields.push({key:'bars',label:'Datos',type:'text'});
    if(p.logo !== undefined) fields.push({key:'logo',label:'Logo',type:'text'});
    if(p.links !== undefined) fields.push({key:'links',label:'Links',type:'text'});
    if(p.imageBg !== undefined) fields.push({key:'imageBg',label:'Img Fondo',type:'color',textType:true});
    if(p.showImage !== undefined) fields.push({key:'showImage',label:'Mostrar Img',type:'select',options:['true:Si','false:No']});
    return fields;
}

function renderPropField(elId, f) {
    const el = getSelected();
    const val = el.props[f.key];
    if(f.type==='color' && f.textType) {
        const isGradient = typeof val==='string' && val.includes('gradient');
        return `<div class="prop-row"><span class="prop-label">${f.label}</span>
            <input class="prop-input" type="color" value="${isGradient?'#00d4aa':val}" onchange="setElProp(${elId},'${f.key}',this.value)">
            <input class="prop-input" value="${val}" onchange="setElProp(${elId},'${f.key}',this.value)" style="flex:2"></div>`;
    }
    if(f.type==='number') return `<div class="prop-row"><span class="prop-label">${f.label}</span><input class="prop-input" type="number" value="${val}" onchange="setElProp(${elId},'${f.key}',+this.value)"></div>`;
    if(f.type==='select') return `<div class="prop-row"><span class="prop-label">${f.label}</span><select class="prop-select" onchange="setElProp(${elId},'${f.key}',this.value.includes(':')?this.value.split(':')[0]:this.value)">
        ${f.options.map(o=>{const [v,l]=o.split(':');return `<option value="${v}"${String(val)===v?' selected':''}>${l}</option>`;}).join('')}</select></div>`;
    return `<div class="prop-row"><span class="prop-label">${f.label}</span><input class="prop-input" value="${val}" onchange="setElProp(${elId},'${f.key}',this.value)"></div>`;
}

function setProp(id, key, val) {
    const el = S.elements.find(e=>e.id===id);
    if(!el) return;
    el[key] = val;
    renderArtboard();
    updateCode();
}
function setElProp(id, key, val) {
    const el = S.elements.find(e=>e.id===id);
    if(!el) return;
    if(key==='showImage') val = val==='true';
    el.props[key] = val;
    renderArtboard();
    updateCode();
    updateProps();
}
function setAnimation(id, animKey) {
    const el = S.elements.find(e=>e.id===id);
    if(!el) return;
    el.animation = animKey ? {...ANIMS[animKey]} : null;
    renderArtboard();
    updateProps();
    updateTimeline();
    updateCode();
}
function setAnimProp(id, key, val) {
    const el = S.elements.find(e=>e.id===id);
    if(!el || !el.animation) return;
    el.animation[key] = val;
    updateProps();
    updateCode();
}
function duplicateElement(id) {
    const el = S.elements.find(e=>e.id===id);
    if(!el) return;
    const newEl = {id:S.nextId++, type:el.type, x:el.x+20, y:el.y+20, props:{...el.props}, animation:el.animation?{...el.animation}:null};
    S.elements.push(newEl);
    selectElement(newEl.id);
    renderArtboard();
    updateCode();
    updateLayers();
    updateTimeline();
    toast('Elemento duplicado','success');
}

/* ============================================
   GENERACION DE CODIGO
   ============================================ */
function generateCode() {
    const dev = DEVICES[S.device];
    let html = `<!-- NexusStudio - ${dev.label} -->\n`;
    html += `<div style="width:${dev.w}px;min-height:${dev.h}px;background:#ffffff;position:relative;margin:0 auto;font-family:'Space Grotesk',sans-serif;">\n`;

    S.elements.forEach(el => {
        const p = el.props;
        let style = `position:absolute;left:${el.x}px;top:${el.y}px;width:${p.w}px;height:${p.h}px;`;
        let animStyle = '';
        if(el.animation) {
            animStyle = `animation:${el.animation.kf} ${el.animation.dur} ${el.animation.delay} ${el.animation.iter||'forwards'} both;`;
        }

        switch(el.type) {
            case 'button':
                html += `  <button style="${style}display:flex;align-items:center;justify-content:center;background:${p.bg};color:${p.color};border:${p.borderWidth||0}px solid ${p.borderColor||'transparent'};border-radius:${p.borderRadius}px;font-size:${p.fontSize}px;font-weight:${p.fontWeight};cursor:pointer;${p.shadow!=='none'?'box-shadow:'+p.shadow+';':''}${animStyle}">${p.text}</button>\n`;
                break;
            case 'text': case 'heading':
                html += `  <div style="${style}font-size:${p.fontSize}px;font-weight:${p.fontWeight};color:${p.color};text-align:${p.textAlign};line-height:${p.lineHeight};${animStyle}">${p.text}</div>\n`;
                break;
            case 'card':
                html += `  <div style="${style}background:${p.bg};border:1px solid ${p.borderColor};border-radius:${p.borderRadius}px;overflow:hidden;${p.shadow!=='none'?'box-shadow:'+p.shadow+';':''}${animStyle}">\n`;
                if(p.showImage) html += `    <div style="height:${p.imageHeight}px;background:${p.imageBg};"></div>\n`;
                html += `    <div style="padding:${p.padding}px;">\n      <div style="font-size:${p.titleSize}px;font-weight:700;color:${p.titleColor};">${p.title}</div>\n      <div style="font-size:${p.descSize}px;color:${p.descColor};margin-top:4px;">${p.desc}</div>\n    </div>\n  </div>\n`;
                break;
            case 'input':
                html += `  <input type="text" placeholder="${p.placeholder}" style="${style}background:${p.bg};border:1px solid ${p.borderColor};border-radius:${p.borderRadius}px;padding:0 14px;font-size:${p.fontSize}px;color:${p.color};outline:none;${animStyle}">\n`;
                break;
            case 'searchbar':
                html += `  <div style="${style}background:${p.bg};border:1px solid ${p.borderColor};border-radius:${p.borderRadius}px;display:flex;align-items:center;padding:0 16px;gap:10px;${animStyle}">\n    <span style="color:#666;">&#128269;</span>\n    <span style="color:#666;font-size:${p.fontSize}px">${p.placeholder}</span>\n  </div>\n`;
                break;
            case 'badge':
                html += `  <span style="display:inline-flex;align-items:center;background:${p.bg};color:${p.color};border-radius:${p.borderRadius}px;font-size:${p.fontSize}px;font-weight:${p.fontWeight};padding:0 12px;${animStyle}">${p.text}</span>\n`;
                break;
            case 'avatar':
                html += `  <div style="${style}background:${p.bg};border-radius:50%;${p.borderWidth?'border:'+p.borderWidth+'px solid '+p.borderColor+';':''}${p.shadow!=='none'?'box-shadow:'+p.shadow+';':''}${animStyle}"></div>\n`;
                break;
            case 'image':
                html += `  <div style="${style}background:${p.bg};border-radius:${p.borderRadius}px;${p.shadow!=='none'?'box-shadow:'+p.shadow+';':''}${animStyle}"></div>\n`;
                break;
            case 'divider':
                html += `  <hr style="${style}background:${p.bg};border:none;${animStyle}">\n`;
                break;
            case 'hero':
                html += `  <div style="${style}background:${p.bg};display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;${animStyle}">\n    <h1 style="font-size:${p.titleSize}px;font-weight:800;color:${p.titleColor};margin-bottom:12px;">${p.title}</h1>\n    <p style="font-size:${p.subtitleSize}px;color:${p.subtitleColor};max-width:280px;">${p.subtitle}</p>\n  </div>\n`;
                break;
            case 'barchart':
                const bars = p.bars.split(',');
                html += `  <div style="${style}background:${p.bg};border-radius:${p.borderRadius}px;padding:12px;display:flex;align-items:flex-end;gap:4px;${p.shadow!=='none'?'box-shadow:'+p.shadow+';':''}${animStyle}">\n`;
                bars.forEach((b,i)=>{ html += `    <div style="flex:1;height:${b.trim()}%;background:${p.barColor};border-radius:4px 4px 0 0;min-height:4px;"></div>\n`; });
                html += `  </div>\n`;
                break;
            case 'statcard':
                html += `  <div style="${style}background:${p.bg};border-radius:${p.borderRadius}px;padding:14px;${p.shadow!=='none'?'box-shadow:'+p.shadow+';':''}${animStyle}">\n    <div style="font-size:${p.labelSize}px;color:#888;">${p.label}</div>\n    <div style="font-size:${p.valueSize}px;font-weight:700;color:#f0f0f0;margin-top:4px;">${p.value}</div>\n    <div style="font-size:11px;color:${p.changeColor};margin-top:4px;">${p.change}</div>\n  </div>\n`;
                break;
            case 'navbar':
                const navLinks = p.links.split(',').map(l=>`<a href="#" style="color:${p.color};opacity:.7;text-decoration:none;font-size:${p.fontSize}px">${l.trim()}</a>`).join('');
                html += `  <nav style="${style}background:${p.bg};display:flex;align-items:center;padding:0 20px;gap:20px;${p.shadow!=='none'?'box-shadow:'+p.shadow+';':''}${animStyle}">\n    <span style="font-weight:700;color:${p.color};font-size:16px;">${p.logo}</span>\n    <div style="flex:1"></div>${navLinks}\n  </nav>\n`;
                break;
            case 'rectangle':
                html += `  <div style="${style}background:${p.bg};border-radius:${p.borderRadius}px;${p.borderWidth?'border:'+p.borderWidth+'px solid '+p.borderColor+';':''}${animStyle}"></div>\n`;
                break;
            case 'circle':
                html += `  <div style="${style}background:${p.bg};border-radius:50%;${animStyle}"></div>\n`;
                break;
            case 'listitem':
                html += `  <div style="${style}background:${p.bg};border:1px solid ${p.borderColor};border-radius:${p.borderRadius}px;display:flex;align-items:center;gap:12px;padding:0 14px;${animStyle}">\n    <div style="width:32px;height:32px;background:${p.iconBg};border-radius:8px;"></div>\n    <div><div style="font-size:${p.titleSize}px;font-weight:600;color:${p.titleColor};">${p.title}</div><div style="font-size:${p.subtitleSize}px;color:${p.subtitleColor};">${p.subtitle}</div></div>\n  </div>\n`;
                break;
            case 'toggle':
                html += `  <div style="${style}background:${p.active?p.activeColor:p.inactiveColor};border-radius:${p.borderRadius}px;position:relative;cursor:pointer;${animStyle}"><div style="width:22px;height:22px;background:#fff;border-radius:50%;position:absolute;top:3px;left:${p.active?'27px':'3px'};box-shadow:0 1px 4px rgba(0,0,0,.3);transition:.3s;"></div></div>\n`;
                break;
            default:
                html += `  <div style="${style}background:#f0f0f0;border-radius:4px;${animStyle}"></div>\n`;
        }
    });

    // Dibujos como SVG
    S.drawPaths.forEach((path, i) => {
        let d = `M ${path.points[0].x} ${path.points[0].y}`;
        for(let j=1;j<path.points.length;j++) {
            const prev = path.points[j-1];
            const curr = path.points[j];
            d += ` Q ${prev.x} ${prev.y} ${(prev.x+curr.x)/2} ${(prev.y+curr.y)/2}`;
        }
        const animAttr = path.animation ? ` style="stroke-dasharray:2000;stroke-dashoffset:2000;animation:nx-drawStroke 1.5s forwards;"` : '';
        html += `  <svg style="position:absolute;top:0;left:0;width:${dev.w}px;height:${dev.h}px;pointer-events:none;z-index:10;"${animAttr}>\n    <path d="${d}" stroke="${path.color}" stroke-width="${path.width}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>\n  </svg>\n`;
    });

    html += `</div>`;

    // CSS de animaciones si hay alguna
    const hasAnims = S.elements.some(e=>e.animation) || S.drawPaths.some(p=>p.animation);
    if(hasAnims) {
        html += `\n<style>\n`;
        const usedKfs = new Set();
        S.elements.forEach(e=>{if(e.animation) usedKfs.add(e.animation.kf);});
        S.drawPaths.forEach(p=>{if(p.animation) usedKfs.add(p.animation.kf);});
        const kfMap = {
            'nx-fadeIn':'@keyframes nx-fadeIn{from{opacity:0}to{opacity:1}}',
            'nx-slideUp':'@keyframes nx-slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}',
            'nx-slideDown':'@keyframes nx-slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}',
            'nx-slideLeft':'@keyframes nx-slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}',
            'nx-slideRight':'@keyframes nx-slideRight{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}',
            'nx-scaleUp':'@keyframes nx-scaleUp{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}',
            'nx-bounce':'@keyframes nx-bounce{0%{transform:scale(0)}50%{transform:scale(1.12)}70%{transform:scale(.95)}100%{transform:scale(1)}}',
            'nx-pulse':'@keyframes nx-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}',
            'nx-rotate':'@keyframes nx-rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}',
            'nx-shake':'@keyframes nx-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}',
            'nx-drawStroke':'@keyframes nx-drawStroke{to{stroke-dashoffset:0}}'
        };
        usedKfs.forEach(kf=>{ if(kfMap[kf]) html += kfMap[kf]+`\n`; });
        html += `</style>\n`;
    }

    return html;
}

function updateCode() {
    const code = generateCode();
    const output = document.getElementById('codeOutput');
    // Syntax highlighting basico
    let highlighted = code
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/(&lt;\/?)([\w-]+)/g, '$1<span class="tag">$2</span>')
        .replace(/([\w-]+)(=)/g, '<span class="attr">$1</span>$2')
        .replace(/"([^"]*)"/g, '"<span class="val">$1</span>"')
        .replace(/(\/\*.*?\*\/)/gs, '<span class="comment">$1</span>')
        .replace(/(@keyframes\s+[\w-]+)/g, '<span class="css-prop">$1</span>')
        .replace(/([\w-]+)(\s*:)([^;{}]+)/g, '<span class="css-prop">$1</span>$2<span class="css-val">$3</span>');
    output.innerHTML = highlighted;
}

function copyCode() {
    const code = generateCode();
    navigator.clipboard.writeText(code).then(()=>{
        toast('Codigo copiado al portapapeles','success');
    }).catch(()=>{
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = code;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('Codigo copiado','success');
    });
}

/* ============================================
   TIMELINE
   ============================================ */
function updateTimeline() {
    const list = document.getElementById('timelineList');
    const empty = document.getElementById('tlEmpty');
    const countEl = document.getElementById('animCount');
    const animElements = S.elements.filter(e=>e.animation);
    const drawAnims = S.drawPaths.filter(p=>p.animation);
    const total = animElements.length + drawAnims.length;
    countEl.textContent = total + ' animacion' + (total!==1?'es':'');

    if(!total) {
        empty.style.display = 'flex';
        list.querySelectorAll('.timeline-item').forEach(i=>i.remove());
        return;
    }
    empty.style.display = 'none';

    let html = '';
    animElements.forEach(el => {
        const name = el.props.text || el.props.title || el.props.label || el.type;
        const dur = parseFloat(el.animation.dur)||0.5;
        const maxDur = 2;
        const pct = Math.min(100, (dur/maxDur)*100);
        html += `<div class="timeline-item">
            <div class="tl-icon"><i class="fa-solid fa-bolt"></i></div>
            <span class="tl-name">${name}</span>
            <span class="tl-anim">${el.animation.name}</span>
            <div class="tl-bar"><div class="tl-bar-fill" style="width:${pct}%"></div></div>
        </div>`;
    });
    drawAnims.forEach((p,i) => {
        html += `<div class="timeline-item">
            <div class="tl-icon"><i class="fa-solid fa-paintbrush"></i></div>
            <span class="tl-name">Dibujo ${i+1}</span>
            <span class="tl-anim">Trazo</span>
            <div class="tl-bar"><div class="tl-bar-fill" style="width:75%"></div></div>
        </div>`;
    });
    // Mantener empty oculto
    list.innerHTML = html + '<div class="empty-state" id="tlEmpty" style="display:none"><i class="fa-solid fa-film"></i><span>Sin animaciones</span></div>';
}

function addAllAnimations() {
    const animKeys = Object.keys(ANIMS);
    S.elements.forEach((el,i) => {
        if(!el.animation) {
            el.animation = {...ANIMS[animKeys[i % animKeys.length]], delay: (i*0.1)+'s'};
        }
    });
    S.drawPaths.forEach(p => {
        if(!p.animation) p.animation = {name:'Trazo', kf:'nx-drawStroke', dur:'1.5s', delay:'0s'};
    });
    renderArtboard();
    updateTimeline();
    updateCode();
    updateProps();
    toast('Animaciones aplicadas a todos los elementos','success');
}

function togglePlay() {
    S.isPlaying = !S.isPlaying;
    const btn = document.getElementById('playBtn');
    const tlBtn = document.getElementById('tlPlayBtn');
    const wrapper = document.getElementById('artboardWrapper');
    if(S.isPlaying) {
        btn.innerHTML = '<i class="fa-solid fa-stop"></i> Detener';
        tlBtn.classList.add('active');
        wrapper.classList.add('playing');
    } else {
        btn.innerHTML = '<i class="fa-solid fa-play"></i> Previsualizar';
        tlBtn.classList.remove('active');
        wrapper.classList.remove('playing');
    }
    renderArtboard();
}

function stopPlay() {
    if(S.isPlaying) togglePlay();
}

function sendChat() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if(!msg) return;
    input.value = '';
    addChatMsg(msg, 'user');
    processCommand(msg);
}

document.getElementById('chatInput').addEventListener('keydown', (e) => {
    if(e.key==='Enter') sendChat();
});

function addChatMsg(text, type) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + type;
    div.innerHTML = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function processCommand(msg) {
    const lower = msg.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const colors = {rojo:'#ff4757',azul:'#4facfe',verde:'#2ed573',amarillo:'#ffd166',negro:'#111111',blanco:'#ffffff',naranja:'#ff8c42',rosa:'#ff6b9d',morado:'#a78bfa',gris:'#888888',teal:'#00d4aa',cyan:'#00f2fe'};
    let responded = false;

    // Comando: agregar componente
    for(const [type, comp] of Object.entries(COMPS)) {
        const typeName = comp.label.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        if(lower.includes(typeName) || lower.includes(type)) {
            const overrides = {};
            // Detectar color
            for(const [cn,cv] of Object.entries(colors)) {
                if(lower.includes(cn) && DEFAULTS[type]?.bg !== undefined) {
                    overrides.bg = cv;
                    break;
                }
            }
            const el = addElement(type, 30 + S.elements.length*5, 30 + S.elements.length*5, overrides);
            addChatMsg(`<strong>${comp.label}</strong> agregado al canvas`, 'bot');
            responded = true;
            break;
        }
    }

    // Comando: cambiar color
    if(!responded && (lower.includes('cambiar color') || lower.includes('color a'))) {
        const sel = getSelected();
        if(!sel) { addChatMsg('Primero selecciona un elemento', 'bot'); return; }
        for(const [cn,cv] of Object.entries(colors)) {
            if(lower.includes(cn)) {
                if(DEFAULTS[sel.type]?.bg !== undefined) { sel.props.bg = cv; }
                if(DEFAULTS[sel.type]?.color !== undefined && !['toggle'].includes(sel.type)) { sel.props.color = cn==='negro'?'#000':cn==='blanco'?'#fff':'#f0f0f0'; }
                renderArtboard(); updateCode(); updateProps();
                addChatMsg(`Color cambiado a <strong>${cn}</strong>`, 'bot');
                responded = true; break;
            }
        }
        if(!responded) addChatMsg('Color no reconocido. Prueba: rojo, azul, verde, teal...', 'bot');
    }

    // Comando: cambiar texto
    if(!responded && (lower.includes('cambiar texto') || lower.includes('texto a'))) {
        const sel = getSelected();
        if(!sel) { addChatMsg('Primero selecciona un elemento', 'bot'); return; }
        const newText = msg.replace(/cambiar texto a /i,'').replace(/texto a /i,'').trim();
        if(sel.props.text !== undefined) sel.props.text = newText;
        else if(sel.props.title !== undefined) sel.props.title = newText;
        renderArtboard(); updateCode(); updateProps();
        addChatMsg(`Texto actualizado a "<strong>${newText}</strong>"`, 'bot');
        responded = true;
    }

    // Comando: animar
    if(!responded && lower.includes('animar')) {
        const sel = getSelected();
        if(!sel) { addChatMsg('Primero selecciona un elemento', 'bot'); return; }
        let foundAnim = null;
        for(const [k,v] of Object.entries(ANIMS)) {
            if(lower.includes(v.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")) || lower.includes(k)) {
                foundAnim = k; break;
            }
        }
        if(!foundAnim) {
            // Asignar animacion aleatoria
            const keys = Object.keys(ANIMS);
            foundAnim = keys[Math.floor(Math.random()*keys.length)];
        }
        sel.animation = {...ANIMS[foundAnim]};
        renderArtboard(); updateCode(); updateProps(); updateTimeline();
        addChatMsg(`Animacion <strong>${ANIMS[foundAnim].name}</strong> aplicada`, 'bot');
        responded = true;
    }

    // Comando: borrar / eliminar
    if(!responded && (lower.includes('borrar') || lower.includes('eliminar'))) {
        const sel = getSelected();
        if(!sel) { addChatMsg('No hay elemento seleccionado', 'bot'); return; }
        removeElement(sel.id);
        addChatMsg('Elemento eliminado', 'bot');
        responded = true;
    }

    // Comando: duplicar
    if(!responded && lower.includes('duplicar')) {
        const sel = getSelected();
        if(!sel) { addChatMsg('No hay elemento seleccionado', 'bot'); return; }
        duplicateElement(sel.id);
        addChatMsg('Elemento duplicado', 'bot');
        responded = true;
    }

    // Comando: dispositivo
    if(!responded) {
        if(lower.includes('telefono') || lower.includes('phone') || lower.includes('movil')) {
            S.device='phone'; updateDevice();
            addChatMsg('Dispositivo: <strong>Telefono</strong>', 'bot'); responded=true;
        } else if(lower.includes('tablet')) {
            S.device='tablet'; updateDevice();
            addChatMsg('Dispositivo: <strong>Tablet</strong>', 'bot'); responded=true;
        } else if(lower.includes('escritorio') || lower.includes('desktop') || lower.includes('pc')) {
            S.device='desktop'; updateDevice();
            addChatMsg('Dispositivo: <strong>Escritorio</strong>', 'bot'); responded=true;
        }
    }

    // Comando: limpiar
    if(!responded && (lower.includes('limpiar') || lower.includes('limpiar todo') || lower.includes('nuevo'))) {
        S.elements = []; S.drawPaths = []; S.selectedId = null;
        renderArtboard(); updateCode(); updateLayers(); updateTimeline(); updateProps();
        addChatMsg('Canvas limpiado', 'bot'); responded=true;
    }

    // Comando: ayuda
    if(!responded && lower.includes('ayuda') || lower.includes('help')) {
        addChatMsg('Comandos disponibles:<br><strong>agregar [componente]</strong> - Agrega al canvas<br><strong>cambiar color [color]</strong> - Cambia fondo<br><strong>cambiar texto [texto]</strong> - Cambia texto<br><strong>animar [tipo]</strong> - Aplica animacion<br><strong>borrar</strong> - Elimina seleccion<br><strong>duplicar</strong> - Duplica seleccion<br><strong>telefono/tablet/pc</strong> - Cambia dispositivo<br><strong>limpiar</strong> - Reinicia canvas', 'bot');
        responded = true;
    }

    if(!responded) {
        addChatMsg('No entendi ese comando. Escribe <strong>ayuda</strong> para ver las opciones disponibles.', 'bot');
    }
}

/* ============================================
   COMPONENTES UI
   ============================================ */
function buildComponentsList() {
    const container = document.getElementById('componentsList');
    const cats = {};
    for(const [type, comp] of Object.entries(COMPS)) {
        if(!cats[comp.cat]) cats[comp.cat] = [];
        cats[comp.cat].push({type, ...comp});
    }
    let html = '';
    for(const [cat, items] of Object.entries(cats)) {
        html += `<div class="comp-category"><div class="comp-cat-header">${cat}</div>`;
        items.forEach(item => {
            html += `<div class="comp-item" onclick="addElement('${item.type}')"><i class="fa-solid ${item.icon}"></i>${item.label}</div>`;
        });
        html += `</div>`;
    }
    container.innerHTML = html;
}

/* ============================================
   EXPORTAR HTML COMPLETO
   ============================================ */
function exportHTML() {
    const dev = DEVICES[S.device];
    const code = generateCode();
    const hasAnims = S.elements.some(e=>e.animation) || S.drawPaths.some(p=>p.animation);

    let fullHTML = `<!DOCTYPE html>\n<html lang="es">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>NexusStudio Export</title>\n<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">\n<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">\n<style>\n*{margin:0;padding:0;box-sizing:border-box;}\nbody{background:#0a0a0a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Space Grotesk',sans-serif;}\n`;
    if(hasAnims) {
        const usedKfs = new Set();
        S.elements.forEach(e=>{if(e.animation) usedKfs.add(e.animation.kf);});
        S.drawPaths.forEach(p=>{if(p.animation) usedKfs.add(p.animation.kf);});
        const kfMap = {
            'nx-fadeIn':'@keyframes nx-fadeIn{from{opacity:0}to{opacity:1}}',
            'nx-slideUp':'@keyframes nx-slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}',
            'nx-slideDown':'@keyframes nx-slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}',
            'nx-slideLeft':'@keyframes nx-slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}',
            'nx-slideRight':'@keyframes nx-slideRight{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}',
            'nx-scaleUp':'@keyframes nx-scaleUp{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}',
            'nx-bounce':'@keyframes nx-bounce{0%{transform:scale(0)}50%{transform:scale(1.12)}70%{transform:scale(.95)}100%{transform:scale(1)}}',
            'nx-pulse':'@keyframes nx-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}',
            'nx-rotate':'@keyframes nx-rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}',
            'nx-shake':'@keyframes nx-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}',
            'nx-drawStroke':'@keyframes nx-drawStroke{to{stroke-dashoffset:0}}'
        };
        usedKfs.forEach(kf=>{ if(kfMap[kf]) fullHTML += kfMap[kf]+`\n`; });
    }
    fullHTML += `</style>\n</head>\n<body>\n` + code + `\n</body>\n</html>`;

    const blob = new Blob([fullHTML], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'nexusstudio-export.html';
    a.click();
    URL.revokeObjectURL(url);
    toast('Archivo HTML exportado','success');
}

/* ============================================
   TOAST
   ============================================ */
function toast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    requestAnimationFrame(()=>{
        t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'), 2200);
    });
}

/* ============================================
   ATAJOS DE TECLADO
   ============================================ */
document.addEventListener('keydown', (e) => {
    // No interceptar si estamos escribiendo en un input
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;

    if(e.key==='Delete'||e.key==='Backspace') {
        if(S.selectedId) { removeElement(S.selectedId); toast('Elemento eliminado'); }
    }
    if(e.key==='v'||e.key==='V') {
        S.tool='select';
        document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
        document.querySelector('[data-tool="select"]').classList.add('active');
        renderArtboard();
    }
    if(e.key==='r'||e.key==='R') {
        S.tool='rectangle';
        document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
        document.querySelector('[data-tool="rectangle"]').classList.add('active');
        renderArtboard();
    }
    if(e.key==='c'||e.key==='C') {
        if(!e.ctrlKey && !e.metaKey) {
            S.tool='circle';
            document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
            document.querySelector('[data-tool="circle"]').classList.add('active');
            renderArtboard();
        }
    }
    if(e.key==='t'||e.key==='T') {
        S.tool='text';
        document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
        document.querySelector('[data-tool="text"]').classList.add('active');
        renderArtboard();
    }
    if(e.key==='d'||e.key==='D') {
        if(!e.ctrlKey && !e.metaKey) {
            S.tool='draw';
            document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
            document.querySelector('[data-tool="draw"]').classList.add('active');
            renderArtboard();
        }
    }
    if((e.key==='z'||e.key==='Z') && (e.ctrlKey||e.metaKey)) {
        // Deshacer simple: eliminar ultimo elemento
        if(S.elements.length) {
            const last = S.elements[S.elements.length-1];
            removeElement(last.id);
            toast('Deshacer');
        }
    }
    if(e.key===' ') {
        e.preventDefault();
        togglePlay();
    }
});
